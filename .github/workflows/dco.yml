name: DCO

# Fails a pull request if any of its (non-merge) commits is missing a
# "Signed-off-by:" trailer — the Developer Certificate of Origin check.
# Contributors sign off with `git commit -s`.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on all PR commits
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          commits=$(git rev-list --no-merges "$BASE".."$HEAD")
          for c in $commits; do
            if ! git log -1 --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $c is missing a 'Signed-off-by' line."
              git log -1 --format='  %h %s' "$c"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "All commits must be signed off (DCO). Commit with:  git commit -s"
            echo "To fix an existing branch:  git rebase --signoff $BASE"
            exit 1
          fi
          echo "All commits are signed off. ✓"
